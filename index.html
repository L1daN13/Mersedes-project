<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mercedes Luxury — Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <a class="brand" href="#home" data-nav>
      <div class="brand-star">★</div>
      <span class="brand-text">Mercedes Luxury</span>
    </a>

    <nav class="main-nav">
      <ul>
        <li><a href="#home" data-nav>Головна</a></li>
        <li><a href="#cars" data-nav>Автомобілі</a></li>
        <li><a href="#about" data-nav>Про нас</a></li>
        <li><a href="#contacts" data-nav>Контакти</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO -->
  <section id="home">
    <h1>Mercedes Luxury</h1>
    <p>Преміальні автомобілі Mercedes-Benz</p>
  </section>

  <!-- ABOUT IMAGE FIX -->
  <section id="about">
    <img src="https://picsum.photos/seed/showroom1/800/600" alt="Шоурум" />
    <img src="https://picsum.photos/seed/mblogo/400/400" alt="Лого" />
  </section>

  <!-- CONTACT -->
  <section id="contacts">
    <h2>Контакти</h2>
    <form>
      <input placeholder="Ім'я" />
      <input placeholder="Телефон" />
      <button type="submit">Відправити</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
