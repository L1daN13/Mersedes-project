<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mercedes Luxury — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-auto">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="#home" aria-label="Mercedes Luxury — на Головну">
        <span class="brand-text">MERCEDES LUXURY</span>
      </a>
      <nav class="main-nav" aria-label="Головна навігація">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-list" aria-label="Меню">☰</button>
        <ul id="nav-list">
          <li><a href="#home" data-nav>Головна</a></li>
          <li><a href="#cars" data-nav>Авто</a></li>
          <li><a href="#about" data-nav>Про нас</a></li>
          <li><a href="#contacts" data-nav>Контакти</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button id="themeToggle" class="btn ghost" aria-label="Перемикання теми">🌓</button>
        <a class="btn primary" href="#contacts">Запис</a>
      </div>
    </div>
  </header>

  <main>
    <section id="home" class="page hero active">
      <div class="container hero-content">
        <h1>The Best or Nothing</h1>
        <p class="subtitle">Преміальні автомобілі нового покоління</p>
        <div class="hero-cta">
          <a href="#cars" class="btn primary">Каталог</a>
          <a href="#about" class="btn secondary">Про нас</a>
        </div>
      </div>
    </section>

    <section id="cars" class="page section">
      <div class="container">
        <h2>Каталог</h2>
        <div class="filters">
          <div class="filter-group">
            <label for="search">Пошук</label>
            <input type="search" id="search" placeholder="AMG" />
          </div>
          <div class="filter-group">
            <label for="price">Ціна до (USD)</label>
            <input type="number" id="price" placeholder="220000" />
          </div>
          <div class="filter-group">
            <label for="type">Тип</label>
            <select id="type">
              <option value="">Всі</option>
              <option value="sedan">Седан</option>
              <option value="suv">Позашляховик</option>
              <option value="sport">Спорткар</option>
              <option value="electric">Електро</option>
            </select>
          </div>
          <div class="filter-actions">
            <button id="applyFilters" class="btn secondary">Застосувати</button>
            <button id="resetFilters" class="btn ghost">Скинути</button>
          </div>
        </div>
        <div id="carsGrid" class="grid"></div>
      </div>
    </section>

    <section id="about" class="page section">
      <div class="container">
        <h2>Про нас</h2>
        <p>Преміальний дилер Mercedes-Benz. Тест-драйв, трейд-ін, сервіс.</p>
      </div>
    </section>

    <section id="contacts" class="page section">
      <div class="container">
        <h2>Контакти</h2>
        <form id="contactForm" novalidate>
          <div class="form-row">
            <label for="name">Ім’я</label>
            <input id="name" name="name" type="text" required />
            <span class="error" data-for="name"></span>
          </div>
          <div class="form-row">
            <label for="phone">Телефон</label>
            <input id="phone" name="phone" type="tel" required />
            <span class="error" data-for="phone"></span>
          </div>
          <div class="form-row">
            <label for="model">Модель</label>
            <select id="model" name="model"><option value="">Не обрано</option></select>
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit">Надіслати</button>
            <div id="formStatus" role="status" aria-live="polite"></div>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Модалка -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-box" role="document">
      <button class="modal-close" aria-label="Закрити" data-close>✕</button>
      <div class="modal-media">
        <img id="modalImage" alt="Фото автомобіля" />
        <div class="thumbs" id="modalThumbs"></div>
      </div>
      <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p class="modal-price" id="modalPrice"></p>
        <p class="modal-desc" id="modalDesc"></p>
        <ul class="modal-specs" id="modalSpecs"></ul>
        <div class="modal-actions">
          <button class="btn primary" id="buyBtn">Купити</button>
          <button class="btn secondary" id="testDriveBtn">Тест-драйв</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
