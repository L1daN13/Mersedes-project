<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mercedes Luxury Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">Mercedes Luxury</div>

  <input id="search" placeholder="Пошук авто...">

  <select id="filter">
    <option value="">Всі</option>
    <option value="sedan">Sedan</option>
    <option value="suv">SUV</option>
    <option value="sport">Sport</option>
    <option value="electric">Electric</option>
  </select>
</header>

<section class="hero">
  <h1>The Best or Nothing</h1>
  <p>Преміальний Mercedes Showroom</p>
</section>

<section id="grid" class="grid"></section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <span id="close">✕</span>

    <div class="modal-left">
      <img id="mainImg">
      <div id="thumbs" class="thumbs"></div>
    </div>

    <div class="modal-right">
      <h2 id="title"></h2>
      <p id="desc"></p>

      <ul id="specs"></ul>

      <button class="btn">Запис на тест-драйв</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
